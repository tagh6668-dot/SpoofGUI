name: Build and Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release draft'
        type: boolean
        required: false
        default: false
      release_tag:
        description: 'Release tag (e.g. v1.0.1)'
        type: string
        required: false
        default: 'v1.0.1'
      release_title:
        description: 'Release title'
        type: string
        required: false
        default: 'Release v1.0.1'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Package
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'app/SpoofGUI/EngineSource/requirements.txt'

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r app/SpoofGUI/EngineSource/requirements.txt

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build release packages
        shell: cmd
        run: build-release.bat

      - name: Upload Build Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: spoofgui-build-packages
          path: |
            dist/SpoofGUI-Portable.exe
            dist/SpoofGUI-Setup.exe
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release (Draft)
        if: ${{ inputs.create_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_title }}
          draft: true
          prerelease: false
          files: |
            dist/SpoofGUI-Portable.exe
            dist/SpoofGUI-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
