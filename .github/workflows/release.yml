name: Build and Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release draft'
        type: boolean
        required: false
        default: false
      release_tag:
        description: 'Release tag (e.g. v1.0.4)'
        type: string
        required: false
        default: 'v1.0.4'
      release_title:
        description: 'Release title'
        type: string
        required: false
        default: 'Release v1.0.4'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: x86

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build release packages (${{ matrix.arch }})
        shell: cmd
        run: build-release.bat -Arch ${{ matrix.arch }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spoofgui-${{ matrix.arch }}
          path: |
            dist/SpoofGUI-Portable-${{ matrix.arch }}.zip
            dist/SpoofGUI-Setup-${{ matrix.arch }}.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release (Draft)
    needs: build
    if: ${{ inputs.create_release == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release (Draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_title }}
          draft: true
          prerelease: false
          files: |
            artifacts/SpoofGUI-Portable-amd64.zip
            artifacts/SpoofGUI-Setup-amd64.exe
            artifacts/SpoofGUI-Portable-x86.zip
            artifacts/SpoofGUI-Setup-x86.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
